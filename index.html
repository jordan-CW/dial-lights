<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appliances dial interaction lab</title>
  <style>
    :root {
      color-scheme: light;
      --panel: #f7f7f4;
      --panel-border: #d8d6cf;
      --text: #242424;
      --muted: #66645f;
      --control: #ffffff;
      --accent: #111111;
      --stage: #c9c8c4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--stage);
    }

    body {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(430px, 1fr);
      gap: 22px;
      padding: 18px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .panel {
      align-self: start;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
    }

    .panel h1 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: 0;
    }

    .group {
      border-top: 1px solid #dedcd5;
      padding-top: 12px;
      margin-top: 12px;
    }

    .group:first-of-type {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 650;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .field {
      margin-bottom: 10px;
    }

    select,
    input[type="text"],
    input[type="number"] {
      width: 100%;
      height: 34px;
      border: 1px solid #c9c7bf;
      border-radius: 6px;
      background: var(--control);
      color: var(--text);
      padding: 5px 8px;
    }

    input[type="color"] {
      width: 44px;
      height: 34px;
      padding: 0;
      border: 1px solid #c9c7bf;
      border-radius: 6px;
      background: var(--control);
    }

    input[type="range"] {
      width: 100%;
      accent-color: #1d1d1d;
    }

    .color-row {
      display: grid;
      grid-template-columns: 48px minmax(96px, 1fr);
      gap: 8px;
      align-items: end;
    }

    .rgb-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .range-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 46px;
      gap: 8px;
      align-items: center;
      margin-bottom: 9px;
    }

    .range-line output {
      text-align: right;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
    }

    .timing-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .hidden {
      display: none;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .command {
      height: 36px;
      border: 1px solid #111;
      border-radius: 6px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    .command.secondary {
      background: #fff;
      color: #111;
    }

    .readout {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .stage-wrap {
      min-width: 0;
      display: grid;
      grid-template-rows: minmax(0, auto) auto;
      gap: 16px;
      align-content: start;
    }

    .stage {
      position: relative;
      width: min(72vh, 538px);
      max-width: 100%;
      aspect-ratio: 1 / 1;
      justify-self: center;
      border-radius: 10px;
      overflow: hidden;
      background: #c9c8c4;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
    }

    .stage img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .led-ring {
      position: absolute;
      left: 41.6%;
      top: 58.2%;
      width: 43.2%;
      height: 43.2%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: clamp(10px, 3.1vw, 18px) solid rgba(255, 198, 134, 0);
      pointer-events: none;
      mix-blend-mode: screen;
      filter: saturate(0.58) blur(0.25px);
      opacity: 0;
      box-shadow: 0 0 18px rgba(255, 198, 134, 0), inset 0 0 15px rgba(255, 198, 134, 0);
    }

    .button-hit {
      position: absolute;
      left: 41.6%;
      top: 58.2%;
      width: 31.6%;
      height: 31.6%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .graph-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.11);
    }

    .graph-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    canvas {
      display: block;
      width: 100%;
      height: 210px;
      border: 1px solid #d6d3ca;
      border-radius: 6px;
      background: #fbfaf6;
    }

    @media (max-width: 900px) {
      body {
        grid-template-columns: 1fr;
      }

      .stage {
        width: min(92vw, 538px);
      }
    }
  </style>
</head>
<body>
  <aside class="panel">
    <h1>Dial interaction lab</h1>

    <div class="group">
      <div class="field">
        <label for="behavior">interaction</label>
        <select id="behavior">
          <option value="sine-continuous">sinusoidal continuous</option>
          <option value="sine-hold">sinusoidal with holds</option>
          <option value="linear-continuous">linear continuous</option>
          <option value="linear-fade">linear fade on/off</option>
          <option value="flash">flash</option>
          <option value="double-flash">double flash</option>
          <option value="log-slow-fast">log fade slow to fast</option>
          <option value="log-fast-slow">log fade fast to slow</option>
          <option value="heartbeat">heartbeat</option>
          <option value="solid">solid on</option>
        </select>
      </div>

      <div class="button-row">
        <button class="command" id="startStop" type="button">start</button>
        <button class="command secondary" id="reset" type="button">reset</button>
      </div>
      <div class="readout" id="status">stopped, brightness 0%</div>
    </div>

    <div class="group">
      <div class="color-row">
        <div class="field">
          <label for="colorPicker">color</label>
          <input id="colorPicker" type="color" value="#ffc686">
        </div>
        <div class="field">
          <label for="hexInput">hex</label>
          <input id="hexInput" type="text" value="#FFC686" spellcheck="false">
        </div>
      </div>

      <div class="rgb-row">
        <div class="field">
          <label for="redInput">red</label>
          <input id="redInput" type="number" min="0" max="255" value="255">
        </div>
        <div class="field">
          <label for="greenInput">green</label>
          <input id="greenInput" type="number" min="0" max="255" value="198">
        </div>
        <div class="field">
          <label for="blueInput">blue</label>
          <input id="blueInput" type="number" min="0" max="255" value="134">
        </div>
      </div>
    </div>

    <div class="group">
      <div class="range-line">
        <label for="minBrightness">minimum brightness</label>
        <output id="minBrightnessOut">0%</output>
        <input id="minBrightness" type="range" min="0" max="100" value="0">
      </div>

      <div class="range-line">
        <label for="maxBrightness">maximum brightness</label>
        <output id="maxBrightnessOut">100%</output>
        <input id="maxBrightness" type="range" min="0" max="100" value="100">
      </div>
    </div>

    <div class="group timing-group" id="periodGroup">
      <div class="field">
        <label for="periodMs">period ms</label>
        <input id="periodMs" type="number" min="100" step="50" value="3200">
      </div>
    </div>

    <div class="group timing-group hidden" id="rampGroup">
      <div class="timing-grid">
        <div class="field">
          <label for="rampOnMs">fade on ms</label>
          <input id="rampOnMs" type="number" min="0" step="50" value="1400">
        </div>
        <div class="field">
          <label for="holdOnMs">hold on ms</label>
          <input id="holdOnMs" type="number" min="0" step="50" value="450">
        </div>
        <div class="field">
          <label for="rampOffMs">fade off ms</label>
          <input id="rampOffMs" type="number" min="0" step="50" value="1400">
        </div>
        <div class="field">
          <label for="holdOffMs">hold off ms</label>
          <input id="holdOffMs" type="number" min="0" step="50" value="650">
        </div>
      </div>
    </div>

    <div class="group timing-group hidden" id="flashGroup">
      <div class="timing-grid">
        <div class="field">
          <label for="flashOnMs">on ms</label>
          <input id="flashOnMs" type="number" min="20" step="10" value="140">
        </div>
        <div class="field">
          <label for="flashOffMs">off ms</label>
          <input id="flashOffMs" type="number" min="20" step="10" value="760">
        </div>
      </div>
    </div>

    <div class="group timing-group hidden" id="doubleFlashGroup">
      <div class="timing-grid">
        <div class="field">
          <label for="doubleOnMs">flash on ms</label>
          <input id="doubleOnMs" type="number" min="20" step="10" value="110">
        </div>
        <div class="field">
          <label for="doubleGapMs">gap ms</label>
          <input id="doubleGapMs" type="number" min="20" step="10" value="120">
        </div>
        <div class="field">
          <label for="doublePauseMs">pause ms</label>
          <input id="doublePauseMs" type="number" min="20" step="10" value="780">
        </div>
      </div>
    </div>

    <div class="group timing-group hidden" id="curveGroup">
      <div class="field">
        <label for="curvePower">curve strength</label>
        <input id="curvePower" type="number" min="1.2" max="8" step="0.1" value="3.2">
      </div>
    </div>
  </aside>

  <main class="stage-wrap">
    <section class="stage" aria-label="coffee maker dial preview">
      <img src="assets/Coffee UI 1.png" alt="Coffee maker dial">
      <div class="led-ring" id="ledRing"></div>
      <button class="button-hit" id="imageButton" type="button" aria-label="start or stop"></button>
    </section>

    <section class="graph-card">
      <div class="graph-head">
        <div>brightness over time</div>
        <div id="graphMeta">0 ms cycle</div>
      </div>
      <canvas id="graph" width="980" height="420"></canvas>
    </section>
  </main>

  <script>
    (function () {
      var running = false;
      var startTime = performance.now();
      var color = { r: 255, g: 198, b: 134 };

      var behavior = document.getElementById('behavior');
      var startStop = document.getElementById('startStop');
      var reset = document.getElementById('reset');
      var imageButton = document.getElementById('imageButton');
      var ledRing = document.getElementById('ledRing');
      var status = document.getElementById('status');
      var graphMeta = document.getElementById('graphMeta');
      var canvas = document.getElementById('graph');
      var ctx = canvas.getContext('2d');

      var colorPicker = document.getElementById('colorPicker');
      var hexInput = document.getElementById('hexInput');
      var redInput = document.getElementById('redInput');
      var greenInput = document.getElementById('greenInput');
      var blueInput = document.getElementById('blueInput');

      var minBrightness = document.getElementById('minBrightness');
      var maxBrightness = document.getElementById('maxBrightness');
      var minBrightnessOut = document.getElementById('minBrightnessOut');
      var maxBrightnessOut = document.getElementById('maxBrightnessOut');

      var periodMs = document.getElementById('periodMs');
      var rampOnMs = document.getElementById('rampOnMs');
      var holdOnMs = document.getElementById('holdOnMs');
      var rampOffMs = document.getElementById('rampOffMs');
      var holdOffMs = document.getElementById('holdOffMs');
      var flashOnMs = document.getElementById('flashOnMs');
      var flashOffMs = document.getElementById('flashOffMs');
      var doubleOnMs = document.getElementById('doubleOnMs');
      var doubleGapMs = document.getElementById('doubleGapMs');
      var doublePauseMs = document.getElementById('doublePauseMs');
      var curvePower = document.getElementById('curvePower');

      var periodGroup = document.getElementById('periodGroup');
      var rampGroup = document.getElementById('rampGroup');
      var flashGroup = document.getElementById('flashGroup');
      var doubleFlashGroup = document.getElementById('doubleFlashGroup');
      var curveGroup = document.getElementById('curveGroup');

      function clamp(value, min, max) {
        value = Number(value);
        if (!Number.isFinite(value)) return min;
        return Math.min(max, Math.max(min, value));
      }

      function readMs(input, fallback) {
        return Math.max(0, Math.round(clamp(input.value, 0, 60000) || fallback || 0));
      }

      function rgbToHex(rgb) {
        return '#' + [rgb.r, rgb.g, rgb.b].map(function (v) {
          return clamp(v, 0, 255).toString(16).padStart(2, '0');
        }).join('').toUpperCase();
      }

      function parseHex(value) {
        var h = String(value || '').trim();
        if (h.charAt(0) === '#') h = h.slice(1);
        if (h.length === 3) h = h.charAt(0) + h.charAt(0) + h.charAt(1) + h.charAt(1) + h.charAt(2) + h.charAt(2);
        if (!/^[0-9a-fA-F]{6}$/.test(h)) return null;
        var n = parseInt(h, 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }

      function setColor(next, source) {
        color = {
          r: Math.round(clamp(next.r, 0, 255)),
          g: Math.round(clamp(next.g, 0, 255)),
          b: Math.round(clamp(next.b, 0, 255))
        };
        var hex = rgbToHex(color);
        if (source !== 'hex') hexInput.value = hex;
        if (source !== 'picker') colorPicker.value = hex;
        if (source !== 'r') redInput.value = color.r;
        if (source !== 'g') greenInput.value = color.g;
        if (source !== 'b') blueInput.value = color.b;
      }

      function settings() {
        var min = clamp(minBrightness.value, 0, 100) / 100;
        var max = clamp(maxBrightness.value, 0, 100) / 100;
        if (max < min) {
          var swap = min;
          min = max;
          max = swap;
        }
        return {
          type: behavior.value,
          min: min,
          max: max,
          period: Math.max(100, readMs(periodMs, 3200)),
          rampOn: readMs(rampOnMs, 1400),
          holdOn: readMs(holdOnMs, 450),
          rampOff: readMs(rampOffMs, 1400),
          holdOff: readMs(holdOffMs, 650),
          flashOn: Math.max(1, readMs(flashOnMs, 140)),
          flashOff: Math.max(1, readMs(flashOffMs, 760)),
          doubleOn: Math.max(1, readMs(doubleOnMs, 110)),
          doubleGap: Math.max(1, readMs(doubleGapMs, 120)),
          doublePause: Math.max(1, readMs(doublePauseMs, 780)),
          power: clamp(curvePower.value, 1.2, 8)
        };
      }

      function scale(unit, s) {
        unit = clamp(unit, 0, 1);
        return s.min + (s.max - s.min) * unit;
      }

      function cycleDuration(s) {
        switch (s.type) {
          case 'solid':
            return 2000;
          case 'sine-continuous':
          case 'linear-continuous':
          case 'heartbeat':
            return s.period;
          case 'flash':
            return s.flashOn + s.flashOff;
          case 'double-flash':
            return s.doubleOn + s.doubleGap + s.doubleOn + s.doublePause;
          default:
            return Math.max(1, s.rampOn + s.holdOn + s.rampOff + s.holdOff);
        }
      }

      function sinusoidalIn(t) {
        return 0.5 - 0.5 * Math.cos(Math.PI * clamp(t, 0, 1));
      }

      function slowFast(t, p) {
        return Math.pow(clamp(t, 0, 1), p);
      }

      function fastSlow(t, p) {
        return 1 - Math.pow(1 - clamp(t, 0, 1), p);
      }

      function phaseRamp(t, s, mode) {
        var x = t;
        if (x < s.rampOn) {
          var onT = s.rampOn ? x / s.rampOn : 1;
          if (mode === 'sine') return sinusoidalIn(onT);
          if (mode === 'slow-fast') return slowFast(onT, s.power);
          if (mode === 'fast-slow') return fastSlow(onT, s.power);
          return onT;
        }
        x -= s.rampOn;
        if (x < s.holdOn) return 1;
        x -= s.holdOn;
        if (x < s.rampOff) {
          var offT = s.rampOff ? x / s.rampOff : 1;
          if (mode === 'sine') return 1 - sinusoidalIn(offT);
          if (mode === 'slow-fast') return 1 - slowFast(offT, s.power);
          if (mode === 'fast-slow') return 1 - fastSlow(offT, s.power);
          return 1 - offT;
        }
        return 0;
      }

      function gaussian(x, center, width) {
        var d = (x - center) / width;
        return Math.exp(-(d * d));
      }

      function brightnessAt(ms, s) {
        var duration = cycleDuration(s);
        var t = duration ? ((ms % duration) + duration) % duration : 0;
        var x = duration ? t / duration : 0;
        var unit = 0;

        switch (s.type) {
          case 'solid':
            unit = 1;
            break;
          case 'sine-continuous':
            unit = 0.5 - 0.5 * Math.cos(Math.PI * 2 * x);
            break;
          case 'sine-hold':
            unit = phaseRamp(t, s, 'sine');
            break;
          case 'linear-continuous':
            unit = x < 0.5 ? x * 2 : (1 - x) * 2;
            break;
          case 'linear-fade':
            unit = phaseRamp(t, s, 'linear');
            break;
          case 'flash':
            unit = t < s.flashOn ? 1 : 0;
            break;
          case 'double-flash':
            unit = (t < s.doubleOn || (t >= s.doubleOn + s.doubleGap && t < s.doubleOn + s.doubleGap + s.doubleOn)) ? 1 : 0;
            break;
          case 'log-slow-fast':
            unit = phaseRamp(t, s, 'slow-fast');
            break;
          case 'log-fast-slow':
            unit = phaseRamp(t, s, 'fast-slow');
            break;
          case 'heartbeat':
            unit = Math.min(1, gaussian(x, 0.18, 0.035) + 0.72 * gaussian(x, 0.32, 0.045));
            break;
          default:
            unit = 0;
            break;
        }

        return scale(unit, s);
      }

      function setBrightness(value) {
        value = clamp(value, 0, 1);
        var material = 0.82;
        var r = Math.round(clamp(color.r * material, 0, 255));
        var g = Math.round(clamp(color.g * material, 0, 255));
        var b = Math.round(clamp(color.b * material, 0, 255));
        var alpha = Math.min(1, value * 0.82);
        var shadowAlpha = Math.min(0.95, value * 0.72);
        var blur = 18 + Math.round(value * 20);
        ledRing.style.borderColor = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
        ledRing.style.boxShadow = '0 0 ' + blur + 'px rgba(' + r + ',' + g + ',' + b + ',' + shadowAlpha + '), inset 0 0 ' + Math.round(blur * 0.75) + 'px rgba(' + r + ',' + g + ',' + b + ',' + (shadowAlpha * 0.78) + ')';
        ledRing.style.filter = 'saturate(0.62) blur(0.25px)';
        ledRing.style.opacity = value > 0.01 ? 1 : 0;
        status.textContent = (running ? 'running' : 'stopped') + ', brightness ' + Math.round(value * 100) + '%';
      }

      function updateTimingVisibility() {
        var type = behavior.value;
        periodGroup.classList.toggle('hidden', !(type === 'sine-continuous' || type === 'linear-continuous' || type === 'heartbeat'));
        rampGroup.classList.toggle('hidden', !(type === 'sine-hold' || type === 'linear-fade' || type === 'log-slow-fast' || type === 'log-fast-slow'));
        flashGroup.classList.toggle('hidden', type !== 'flash');
        doubleFlashGroup.classList.toggle('hidden', type !== 'double-flash');
        curveGroup.classList.toggle('hidden', !(type === 'log-slow-fast' || type === 'log-fast-slow'));
      }

      function drawGraph(now) {
        var s = settings();
        var rect = canvas.getBoundingClientRect();
        var dpr = window.devicePixelRatio || 1;
        var w = Math.max(320, Math.round(rect.width * dpr));
        var h = Math.max(160, Math.round(rect.height * dpr));
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#fbfaf6';
        ctx.fillRect(0, 0, w, h);

        var padL = 48 * dpr;
        var padR = 14 * dpr;
        var padT = 14 * dpr;
        var padB = 32 * dpr;
        var gw = w - padL - padR;
        var gh = h - padT - padB;
        var duration = cycleDuration(s);
        var graphDuration = duration * 2;
        var yMax = 1;

        ctx.strokeStyle = '#e0ddd4';
        ctx.lineWidth = 1 * dpr;
        ctx.beginPath();
        for (var gx = 0; gx <= 4; gx++) {
          var x = padL + (gw * gx / 4);
          ctx.moveTo(x, padT);
          ctx.lineTo(x, padT + gh);
        }
        for (var gy = 0; gy <= 4; gy++) {
          var y = padT + (gh * gy / 4);
          ctx.moveTo(padL, y);
          ctx.lineTo(padL + gw, y);
        }
        ctx.stroke();

        ctx.strokeStyle = '#2f2f2c';
        ctx.lineWidth = 1.5 * dpr;
        ctx.beginPath();
        ctx.moveTo(padL, padT);
        ctx.lineTo(padL, padT + gh);
        ctx.lineTo(padL + gw, padT + gh);
        ctx.stroke();

        ctx.strokeStyle = '#111111';
        ctx.lineWidth = 2.2 * dpr;
        ctx.beginPath();
        var samples = 520;
        for (var i = 0; i <= samples; i++) {
          var sampleT = graphDuration * i / samples;
          var b = brightnessAt(sampleT, s);
          var px = padL + gw * i / samples;
          var py = padT + gh * (1 - clamp(b / yMax, 0, 1));
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();

        var liveT = running ? ((now - startTime) % graphDuration) : 0;
        var liveB = running ? brightnessAt(now - startTime, s) : 0;
        var markerX = padL + gw * (liveT / graphDuration);
        var markerY = padT + gh * (1 - clamp(liveB / yMax, 0, 1));

        ctx.strokeStyle = 'rgba(171, 87, 49, 0.8)';
        ctx.lineWidth = 1.3 * dpr;
        ctx.beginPath();
        ctx.moveTo(markerX, padT);
        ctx.lineTo(markerX, padT + gh);
        ctx.stroke();

        ctx.fillStyle = '#ab5731';
        ctx.beginPath();
        ctx.arc(markerX, markerY, 4.5 * dpr, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#5f5c55';
        ctx.font = (11 * dpr) + 'px ui-sans-serif, system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for (var tick = 0; tick <= 4; tick++) {
          var pct = Math.round((yMax - yMax * tick / 4) * 100);
          ctx.fillText(pct + '%', padL - 8 * dpr, padT + gh * tick / 4);
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('0 ms', padL, padT + gh + 9 * dpr);
        ctx.fillText(Math.round(graphDuration) + ' ms', padL + gw, padT + gh + 9 * dpr);

        graphMeta.textContent = Math.round(duration) + ' ms cycle, two cycles shown';
      }

      function render(now) {
        var s = settings();
        var b = running ? brightnessAt(now - startTime, s) : 0;
        minBrightnessOut.textContent = Math.round(s.min * 100) + '%';
        maxBrightnessOut.textContent = Math.round(s.max * 100) + '%';
        setBrightness(b);
        drawGraph(now);
        requestAnimationFrame(render);
      }

      function toggleRun(force) {
        running = typeof force === 'boolean' ? force : !running;
        startStop.textContent = running ? 'stop' : 'start';
        if (running) startTime = performance.now();
      }

      colorPicker.addEventListener('input', function () {
        var parsed = parseHex(colorPicker.value);
        if (parsed) setColor(parsed, 'picker');
      });

      hexInput.addEventListener('input', function () {
        var parsed = parseHex(hexInput.value);
        if (parsed) setColor(parsed, 'hex');
      });

      redInput.addEventListener('input', function () {
        setColor({ r: redInput.value, g: color.g, b: color.b }, 'r');
      });
      greenInput.addEventListener('input', function () {
        setColor({ r: color.r, g: greenInput.value, b: color.b }, 'g');
      });
      blueInput.addEventListener('input', function () {
        setColor({ r: color.r, g: color.g, b: blueInput.value }, 'b');
      });

      behavior.addEventListener('change', function () {
        updateTimingVisibility();
        startTime = performance.now();
      });

      startStop.addEventListener('click', function () { toggleRun(); });
      imageButton.addEventListener('click', function () { toggleRun(); });
      reset.addEventListener('click', function () {
        startTime = performance.now();
      });

      Array.prototype.forEach.call(document.querySelectorAll('input, select'), function (control) {
        control.addEventListener('input', function () {
          if (control !== hexInput && control !== colorPicker && control !== redInput && control !== greenInput && control !== blueInput) {
            drawGraph(performance.now());
          }
        });
      });

      setColor(color);
      updateTimingVisibility();
      requestAnimationFrame(render);
    }());
  </script>
</body>
</html>
